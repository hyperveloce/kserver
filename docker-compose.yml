version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# DNA Core — kserver docker-compose.yml
# All secrets live in .env — never commit .env to git
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app_network:
    driver: bridge
    external: true

volumes:
  nextclouddb_data:
    name: nextclouddb_data
  immichdb_data:
    name: immichdb_data
  homeassistantdb_data:
    name: homeassistantdb_data

services:
  # ── REVERSE PROXY ───────────────────────────────────────────────────────────
  caddy:
    image: slothcroissant/caddy-cloudflaredns:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /srv/data/caddy_data/Caddyfile:/etc/caddy/Caddyfile
      - /srv/data/caddy_data:/data
      - /srv/data/caddy_config:/config
    env_file:
      - /srv/data/secrets.env
    networks:
      - app_network

  # ── CLOUDFLARE TUNNEL ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --no-tls-verify --token ${CLOUDFLARE_TOKEN}
    volumes:
      - /srv/data/cloudflared_config:/root/.cloudflared
    networks:
      - app_network

  # ── DOCKER SOCKET PROXY ─────────────────────────────────────────────────────
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      STATS: 1
      EVENTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app_network

  # ── DASHBOARD ───────────────────────────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /srv/data/homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/kanasu:/home/kanasu:ro
      - /srv/data:/srv/data:ro
      - /mnt/asus/kserver_backup:/mnt/asus/kserver_backup:ro
    env_file:
      - .env
    environment:
      HOMEPAGE_ALLOWED_HOSTS: home.core-dna.com,192.168.50.201:3000,localhost:3000
      HOMEPAGE_VAR_IMMICH_API_KEY: ${HOMEPAGE_VAR_IMMICH_API_KEY}
      HOMEPAGE_VAR_NC_USER: ${HOMEPAGE_VAR_NC_USER}
      HOMEPAGE_VAR_NC_PASS: ${HOMEPAGE_VAR_NC_PASS}
      HOMEPAGE_VAR_HA_API_KEY: ${HOMEPAGE_VAR_HA_API_KEY}
      PUID: ${PUID}
      PGID: ${PGID}
    networks:
      - app_network

  # ── MEDIA & FILES ───────────────────────────────────────────────────────────
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_server
    restart: unless-stopped
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    depends_on:
      - immich-machine-learning
      - redis
      - postgres
    networks:
      - app_network

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich_machine_learning
    restart: unless-stopped
    volumes:
      - /srv/volume/im_model-cache:/cache
    env_file:
      - .env
    healthcheck:
      disable: false
    networks:
      - app_network

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER: kanasu
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_HOST: nc_db
      REDIS_HOST: nc_redis
      REDIS_HOST_PASSWORD: ${NC_REDIS_PASSWORD}
      REDIS_PORT: 6379
    volumes:
      - /srv/data/nextcloud_data:/var/www/html/data
      - /srv/data/nextcloud_config:/var/www/html/config
      - /srv/data/nextcloud_themes:/var/www/html/themes
    depends_on:
      - nc_db
      - nc_redis
    networks:
      - app_network

  nc_db:
    image: mariadb:10.6
    container_name: nc_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /srv/volume/nextclouddb_data:/var/lib/mysql
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    networks:
      - app_network

  nc_redis:
    image: redis:alpine
    container_name: nc_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${NC_REDIS_PASSWORD}"]
    tmpfs:
      - /data
    networks:
      - app_network

  # ── HOME ASSISTANT ──────────────────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: homeassistant
    restart: unless-stopped
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - /srv/data/homeassistant_config:/config
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - ha_mariadb
    networks:
      - app_network

  ha_mariadb:
    image: mariadb:latest
    container_name: ha_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: homeassistant
      MYSQL_USER: homeassistant
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /srv/volume/homeassistantdb_data:/var/lib/mysql
    networks:
      - app_network

  # ── DATABASE ADMIN ──────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOSTS: nc_db,ha_mariadb
      PMA_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - nc_db
      - ha_mariadb
    networks:
      - app_network

  # ── FRIGATE NVR ──────────────────────────────────────────────────────────────
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    privileged: true
    shm_size: "128mb"
    volumes:
      - /srv/data/frigate_config:/config
      - /srv/data/frigate_media:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
      - TZ=Australia/Melbourne
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    networks:
      - app_network

  # ── MONITORING ──────────────────────────────────────────────────────────────
  beszel:
    image: henrygd/beszel
    container_name: beszel
    restart: unless-stopped
    volumes:
      - /srv/data/beszel_data:/beszel_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docker-socket-proxy
    networks:
      - app_network

  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: 45876
      KEY: ${SSH_KEY}
      TZ: Australia/Melbourne

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - /srv/data/uptime_kuma_data:/app/data
    networks:
      - app_network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=http://docker-socket-proxy:2375
      - TZ=Australia/Melbourne
      # Pi server — uncomment when back online
      # - DOZZLE_REMOTE_HOST=tcp://192.168.50.200:2375
    depends_on:
      - docker-socket-proxy
    networks:
      - app_network

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    pid: "host"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/data/glances_data/glances.conf:/glances/conf/glances.conf
    ports:
      - "61208:61208"
    environment:
      - GLANCES_ENABLE_SENSORS=true
      - TZ=Australia/Melbourne
    command: glances -C /glances/conf/glances.conf -w
    networks:
      - app_network

  speedtest-tracker:
    image: henrywhitaker3/speedtest-tracker
    container_name: speedtest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
      - OOKLA_EULA_GDPR=true
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "200k"
    volumes:
      - /srv/data/speedtest_data:/config
    networks:
      - app_network

  # ── TOOLS ───────────────────────────────────────────────────────────────────
  it_tools:
    image: corentinth/it-tools:latest
    container_name: it_tools
    restart: unless-stopped
    environment:
      - TZ=Australia/Melbourne
    volumes:
      - /srv/data/it_tools_data:/app/data
    networks:
      - app_network

  pairdrop:
    image: lscr.io/linuxserver/pairdrop:latest
    container_name: pairdrop
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
      - RATE_LIMIT=false
      - WS_FALLBACK=false
    networks:
      - app_network

  syncthing:
    image: linuxserver/syncthing
    container_name: syncthing
    restart: unless-stopped
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - /srv/data/syncthing_config:/config
      - /srv/data/syncthing_vault:/sync
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Melbourne
    networks:
      - app_network

  # ── IMMICH DEPENDENCIES ─────────────────────────────────────────────────────
  redis:
    image: docker.io/redis:6.2-alpine@sha256:148bb5411c184abd288d9aaed139c98123eeb8824c5d3fce03cf721db58066d8
    container_name: immich_redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
    tmpfs:
      - /data:size=128m
    networks:
      - app_network

  postgres:
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:739cdd626151ff1f796dc95a6591b55a714f341c737e27f045019ceabf8e8c52
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1;
        Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align
        --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')";
        echo "checksum failure count is $$Chksum";
        [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_period: 5m
    command: >-
      postgres
      -c shared_preload_libraries=vectors.so
      -c 'search_path="$$user", public, vectors'
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=512MB
      -c wal_compression=on
    networks:
      - app_network
